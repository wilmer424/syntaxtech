<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Tech | Soluciones Digitales</title>
    <style>
    body { 
        background-color: #0d1117; 
        color: #c9d1d9; 
        font-family: 'Courier New', Courier, monospace; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        margin: 0; 
        padding: 20px; 
        text-align: center;
    }
    h1 { 
        color: #00d4ff; /* ¡Este es el azul brillante y potente! */
        font-size: clamp(2.5rem, 10vw, 4rem); 
        margin-bottom: 10px; 
        text-shadow: 0 0 10px #00d4ff; /* Esto le da ese efecto de neón */
    }
    p { 
        font-size: clamp(1rem, 5vw, 1.5rem); 
        color: #e6edf3;
        border-right: 2px solid #00d4ff; 
        white-space: nowrap; 
        overflow: hidden; 
        animation: typing 3s steps(30), blink 0.5s infinite; 
        max-width: 90%;
    }
    .contact-btn { 
        margin-top: 30px; 
        padding: 12px 25px; 
        border: 2px solid #00d4ff; 
        color: #00d4ff; 
        text-decoration: none; 
        border-radius: 8px; 
        font-weight: bold;
        transition: 0.3s; 
    }
    .contact-btn:hover { 
        background-color: #00d4ff; 
        color: #0d1117; 
        box-shadow: 0 0 20px #00d4ff;
    }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { from { border-color: transparent } to { border-color: #00d4ff } }
</style>
</head>
<body>
    <h1>> SYNTAX TECH</h1>
    <p>Optimizando sistemas. Desarrollando soluciones.</p>
    <a href="https://wa.me/3172563103" class="contact-btn">CONECTAR CON EL SISTEMA</a>
</body>
</html>
