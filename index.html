<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Tech | Soluciones Digitales</title>
    <style>
   <style>
    body { 
        background-color: #0d1117; 
        color: #c9d1d9; 
        font-family: 'Courier New', Courier, monospace; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        margin: 0; 
        padding: 20px; 
        text-align: center;
    }
    h1 { 
        color: #58a6ff; /* El color original que le gustaba */
        font-size: clamp(2rem, 8vw, 3rem); 
        margin-bottom: 10px; 
    }
    p { 
        font-size: clamp(1rem, 4vw, 1.2rem); 
        border-right: 2px solid #58a6ff; /* Mantenemos el azul original */
        white-space: nowrap; 
        overflow: hidden; 
        animation: typing 3s steps(30), blink 0.5s infinite; 
        max-width: 90%;
    }
    .contact-btn { 
        margin-top: 20px; 
        padding: 10px 20px; 
        border: 1px solid #58a6ff; 
        color: #58a6ff; 
        text-decoration: none; 
        border-radius: 5px; 
        transition: 0.3s; 
    }
    .contact-btn:hover { 
        background-color: #58a6ff; 
        color: #0d1117; 
    }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { from { border-color: transparent } to { border-color: #58a6ff } }
</style>
</style>
</head>
<body>
    <h1>> SYNTAX TECH</h1>
    <p>Optimizando sistemas. Desarrollando soluciones.</p>
